<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#302b63;#24243e;#0f0c29" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#302b63">
        <animate attributeName="stop-color" values="#302b63;#24243e;#0f0c29;#302b63" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#302b63;#24243e" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glitch">
      <feTurbulence type="turbulence" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G">
        <animate attributeName="scale" values="0;3;0;2;0" dur="4s" repeatCount="indefinite"/>
      </feDisplacementMap>
    </filter>
    <radialGradient id="orbGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f0c29" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#grad1)" rx="16"/>

  <!-- Animated orbs -->
  <circle cx="100" cy="140" r="80" fill="url(#orbGrad)" opacity="0.5">
    <animate attributeName="cx" values="100;200;100" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;80;140" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="140" r="100" fill="url(#orbGrad)" opacity="0.4">
    <animate attributeName="cx" values="800;700;800" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;200;140" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Stars/particles -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="50" cy="30" r="1.5"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="60" r="1"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="20" r="1.5"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="50" r="1"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="30" r="1.5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="70" r="1"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="40" r="1.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="250" r="1"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="260" r="1.5"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="240" r="1"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Grid lines -->
  <g stroke="#a855f7" stroke-width="0.3" opacity="0.15">
    <line x1="0" y1="70" x2="900" y2="70"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="150" y1="0" x2="150" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="750" y1="0" x2="750" y2="280"/>
  </g>

  <!-- Main title - shadow layer (glitch) -->
  <text x="450" y="120" font-family="'Courier New', monospace" font-size="68" font-weight="900"
    text-anchor="middle" fill="#ff6b6b" opacity="0.4" filter="url(#glitch)">
    HungBil
  </text>

  <!-- Main title -->
  <text x="450" y="120" font-family="'Courier New', monospace" font-size="68" font-weight="900"
    text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)">
    HungBil
    <animate attributeName="x" values="450;452;449;451;450" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle with typing cursor -->
  <text x="450" y="170" font-family="'Courier New', monospace" font-size="20"
    text-anchor="middle" fill="#00d2ff" opacity="0.9">
    &lt; Full-Stack Developer &amp; AI Builder /&gt;
  </text>

  <!-- Bottom tagline -->
  <text x="450" y="220" font-family="'Courier New', monospace" font-size="14"
    text-anchor="middle" fill="#a855f7" opacity="0.8">
    ✦ Building the future, one commit at a time ✦
  </text>

  <!-- Animated underline -->
  <rect x="200" y="235" height="2" rx="1" fill="url(#textGrad)">
    <animate attributeName="width" values="0;500;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;200;450" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner decorations -->
  <g stroke="#00d2ff" stroke-width="2" fill="none" opacity="0.6">
    <polyline points="10,30 10,10 30,10"/>
    <polyline points="870,10 890,10 890,30"/>
    <polyline points="10,250 10,270 30,270"/>
    <polyline points="870,270 890,270 890,250"/>
  </g>
</svg>
